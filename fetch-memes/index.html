<!DOCTYPE html>
<html lang="en">

<head>
    <meta charset="UTF-8">
    <title>Meme Generator</title>
</head>

<body>

    <h1>Random Meme Generator</h1>

    <input type="text" id="keyword" placeholder="Enter keyword (e.g. dog)">
    <button onclick="getMeme()">Get Meme</button>

    <br><br>

    <img id="meme" width="400" />

    <script>
        async function getMeme() {
            const keyword = document.getElementById('keyword').value || 'funny';

            try {
                const response = await fetch(`https://cart263.onrender.com/meme?keyword=${keyword}`);
                const data = await response.json();

                console.log(data); // useful to see structure

                // ⚠️ adjust this depending on API response
                document.getElementById('meme').src = data.url;

            } catch (err) {
                console.error('Error:', err);
            }
        }
    </script>

</body>

</html>
