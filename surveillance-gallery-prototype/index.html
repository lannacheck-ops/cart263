<!DOCTYPE html>
<html lang="en">

<head>
  <meta charset="utf-8">
  <title>My first three.js app</title>
  <style>
    body {
      margin: 0;
    }

    canvas {
      position: absolute;
    }

    #video {
      position: fixed;
      top: 10px;
      left: 10px;

      width: 360px;
      height: auto;
      outline: 3px solid red;
      z-index: 10;

      opacity: 0;
      transition: opacity 0.2s ease;

    }

    #vidCanvas {
      position: fixed;
      top: 10px;
      left: 10px;

      width: 360px;
      height: auto;

      pointer-events: none;
      z-index: 11;

      /* background: #b31b1b; */
    }
  </style>

  <script type="importmap">
{
  "imports": {
    "three": "https://cdn.jsdelivr.net/npm/three@0.182.0/build/three.module.js",
    "three/addons/": "https://cdn.jsdelivr.net/npm/three@0.182.0/examples/jsm/"
  }
}
</script>
  <script defer src="face-api.min.js"></script>
  <script defer type="module" src="rayCastTest.js"></script>
</head>

<body>

  <!-- canvas that we custom made-->
  <canvas id="three-ex"></canvas>
  <video id="video" autoplay muted></video>
</body>

</html>
